<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChromaMood</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>🎨 ChromaMood</h1>
    <p>Gera paletas de cor com IA a partir de uma descrição</p>
  </header>

  <main>
    <!-- Formulário de Input -->
    <section class="input-section">
      <textarea id="prompt" placeholder="Descreve um mood... ex: café vintage à noite"></textarea>
      <button id="generate-btn">Gerar Paleta</button>
    </section>

    <!-- Área de Resultados -->
    <section class="result-section" id="result" hidden>
      <div id="swatches"></div>
      <div id="typography"></div>
      <div id="mood-description"></div>
    </section>

    <!-- NOVA: Área do Histórico de Paletas -->
    <section class="history-section" id="history-section" hidden>
      <div class="history-header">
        <h2>Histórico de Paletas</h2>
        <button id="clear-history-btn" class="secondary-btn">Limpar Histórico</button>
      </div>
      <div id="history-container"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
